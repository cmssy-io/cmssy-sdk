type CartMutations {
  """Add an item to the cart (public, rate-limited)"""
  addItem(input: AddToCartInput!): Cart!

  """
  Apply a discount code to the active cart for this session (public, rate-limited). Errors with NOT_APPLICABLE when the code is expired / out of redemptions / cart fails minSubtotal / currency mismatch.
  """
  applyDiscount(code: String!, workspaceId: ID!): Cart!

  """
  Convert the active cart into an order (public, rate-limited). Attaches the site member as customer when logged in; otherwise a guest order with the supplied customerEmail.
  """
  checkout(input: CheckoutInput!): Order!

  """Remove all items from the cart (public, rate-limited)"""
  clear(workspaceId: ID!): Cart!

  """
  Merge a guest cart (identified by the cart-session cookie) into the authenticated user's cart. Called by the frontend right after login. Idempotent - safe to call when no guest session exists or after a prior merge succeeded.
  """
  merge(workspaceId: ID!): Cart!

  """
  Remove the applied discount from the active cart (public, rate-limited). Idempotent: succeeds with no change when nothing was applied.
  """
  removeDiscount(workspaceId: ID!): Cart!

  """Remove an item from the cart (public, rate-limited)"""
  removeItem(itemId: ID!, workspaceId: ID!): Cart!

  """Update quantity or notes on a cart item (public, rate-limited)"""
  updateItem(input: UpdateCartItemInput!): Cart!
}

type CartQueries {
  """
  Get the active cart for the current session in this workspace. Returns an empty (non-persistent) cart if no session/cart exists.
  """
  get(workspaceId: ID!): Cart!
}

