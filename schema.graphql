"""Shopping cart for a session, scoped to a workspace"""
type Cart {
  """Discount snapshot if a code is currently applied"""
  appliedDiscount: CartAppliedDiscount

  """Enabled shipping methods the shopper can choose from"""
  availableShippingMethods: [ShippingMethod!]!
  createdAt: DateTime!

  """Currency from the first item's snapshot, or null when empty"""
  currency: String

  """
  subtotal - discount amount (re-derived from appliedDiscount type/value against the CURRENT subtotal, clamped to >= 0). Equals subtotal when no code is applied. free_shipping contributes 0 here; shipping handling lives downstream. computedAmount on the stored snapshot is informational only - the live total always uses fresh derivation so cart edits after apply (add/remove items) can't lock in over-discounts. Eligibility guards (minSubtotal / currency) are re-checked against the snapshot so a cart that drops out of eligibility post-apply contributes 0 discount until the shopper removes and re-applies the code.
  """
  discountedTotal: Int!
  id: String!

  """Sum of quantities across all items"""
  itemCount: Int!
  items: [CartItem!]!

  """
  Whether the workspace's product prices are gross (tax is extracted from them) rather than net (tax is added on top).
  """
  pricesIncludeTax: Boolean!
  sessionId: String!

  """
  Chosen shipping method, or null when none is selected (or the selection no longer resolves - the storefront should re-ask).
  """
  shippingMethod: ShippingMethod

  """
  Shipping charged on this cart. 0 with no method selected, and 0 when a free_shipping discount is applied (CMS-912).
  """
  shippingTotal: Int!
  status: String!

  """Sum of unitPrice * quantity across all items (volume breaks applied)"""
  subtotal: Int!

  """
  VAT on the discounted goods plus the shipping line, computed with the same rules checkout freezes onto the order (CMS-911). 0 when the workspace configured no rates.
  """
  tax: Int!

  """Per-rate VAT rollup: one entry per distinct rate used"""
  taxSummary: [CartTaxSummaryLine!]!

  """
  Amount payable: discountedTotal + tax when prices are net, or discountedTotal itself when prices already include tax.
  """
  totalGross: Int!
  updatedAt: DateTime!
  userId: String
  workspaceId: String!
}

"""
Discount snapshot captured when a code was applied to the cart. Frozen at apply-time so workspace admins editing the source discount cannot retroactively change a cart's total.
"""
type CartAppliedDiscount {
  code: String!

  """
  Resolved discount amount in the cart's currency at apply-time. Clamped to subtotal so the cart total never goes negative.
  """
  computedAmount: Int!
  discountId: String!

  """percentage | fixed | free_shipping"""
  type: String!
  value: Float!
}

