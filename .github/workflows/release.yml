name: Release

# Publishes @cmssy/react + @cmssy/next to npm.
# Trigger by pushing a version tag (e.g. `git tag v0.1.1 && git push --tags`)
# or manually via the Actions tab. Requires an npm Automation access token
# (bypasses 2FA) stored as the `NPM_TOKEN` repository secret.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Serialize releases so two runs can't race past the "already on npm" check.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # On a tag release, the tag must match the package versions being
      # published (package.json is the source of truth). Manual dispatch
      # publishes the current branch's package.json version as-is.
      - name: Verify tag matches package versions
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          for pkg in react next; do
            v=$(node -p "require('./packages/$pkg/package.json').version")
            if [ "$tag" != "$v" ]; then
              echo "::error::tag v$tag does not match @cmssy/$pkg@$v"
              exit 1
            fi
          done

      - run: pnpm install --frozen-lockfile

      # Build first: @cmssy/next typechecks against @cmssy/react's dist .d.ts,
      # which doesn't exist on a fresh checkout until react is built.
      - run: pnpm -r build

      - run: pnpm -r typecheck

      - run: pnpm -r test

      # Publish in dependency order (react before next). Skips a package whose
      # current version is already on npm, so re-runs are safe.
      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          for pkg in react next; do
            cd "packages/$pkg"
            name=$(node -p "require('./package.json').name")
            version=$(node -p "require('./package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already on npm — skipping"
            else
              echo "Publishing $name@$version"
              pnpm publish --access public --no-git-checks
            fi
            cd ../..
          done
