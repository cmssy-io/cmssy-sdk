name: Release

# Publishes @cmssy/react + @cmssy/next to npm.
# Trigger by pushing a version tag (e.g. `git tag v0.1.1 && git push --tags`)
# or manually via the Actions tab. Requires an npm Automation access token
# (bypasses 2FA) stored as the `NPM_TOKEN` repository secret.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Serialize releases so two runs can't race past the "already on npm" check.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # On a tag release, the tag must match the package versions being
      # published (package.json is the source of truth). Manual dispatch
      # publishes the current branch's package.json version as-is.
      - name: Verify tag matches package versions
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          for pkg in core eslint-plugin codemod cli react next astro remix create-cmssy-app; do
            v=$(node -p "require('./packages/$pkg/package.json').version")
            if [ "$tag" != "$v" ]; then
              echo "::error::tag v$tag does not match @cmssy/$pkg@$v"
              exit 1
            fi
          done

      - run: pnpm install --frozen-lockfile

      # Build first: @cmssy/next typechecks against @cmssy/react's dist .d.ts,
      # which doesn't exist on a fresh checkout until react is built.
      - run: pnpm -r build

      - run: pnpm -r typecheck

      - run: pnpm -r test

      # Publish in dependency order (core, then the renderers, then the adapter,
      # then the starter). Skips a package whose current version is already on
      # npm, so re-runs are safe.
      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          for pkg in core eslint-plugin codemod cli react next astro remix create-cmssy-app; do
            cd "packages/$pkg"
            name=$(node -p "require('./package.json').name")
            version=$(node -p "require('./package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already on npm — skipping"
            else
              echo "Publishing $name@$version"
              pnpm publish --access public --no-git-checks
            fi
            # A first publish under this scope lands RESTRICTED even though npm
            # reports "public access", so the package 404s for everyone who is
            # not us. Idempotent on an already-public package, and meaningless
            # for an unscoped one (npm rejects the command outright).
            case "$name" in
              @*) npm access set status=public "$name" ;;
            esac
            cd ../..
          done

      # `npm view` runs with our token, so it happily finds a package nobody
      # else can install - which is exactly how 5.0.0 shipped three packages
      # that 404'd for the world. This asks the registry as a stranger.
      - name: Verify the packages are installable by anyone
        run: |
          set -e
          failed=0
          for pkg in core eslint-plugin codemod cli react next astro remix create-cmssy-app; do
            name=$(node -p "require('./packages/$pkg/package.json').name")
            version=$(node -p "require('./packages/$pkg/package.json').version")
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              "https://registry.npmjs.org/${name}/${version}")
            if [ "$code" = "200" ]; then
              echo "ok  $name@$version"
            else
              echo "FAIL $name@$version — anonymous fetch returned $code"
              failed=1
            fi
          done
          exit $failed
