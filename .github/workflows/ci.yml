name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first: @cmssy/next typechecks + tests against @cmssy/react's
      # dist .d.ts, which doesn't exist on a fresh checkout until react builds.
      - run: pnpm -r build

      - run: pnpm -r typecheck

      - run: pnpm -r test
