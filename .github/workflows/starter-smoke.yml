name: Starter smoke

# Scaffolds a FRESH app with each framework's own CLI, runs the built
# `cmssy init` on it, builds it against this checkout's tarballs, starts it,
# and asks the running site whether its editor works. This is the real user
# path - an adapter nobody runs is an adapter we do not know works, and we
# shipped a dead editor twice while every build was green (CMS-969, CMS-970).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  starter:
    runs-on: ubuntu-latest
    # The `secrets` context is not available in a step `if`, so it is lifted into
    # env once and the steps branch on that.
    env:
      CMSSY_ORG_SLUG: ${{ secrets.CMSSY_ORG_SLUG }}
      CMSSY_WORKSPACE_SLUG: ${{ secrets.CMSSY_WORKSPACE_SLUG }}
      CMSSY_DRAFT_SECRET: ${{ secrets.CMSSY_DRAFT_SECRET }}
    strategy:
      fail-fast: false
      matrix:
        framework: [next, astro, remix]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm -r build

      # The framework's own CLI owns the skeleton; cmssy owns only the wiring.
      # The default home page is removed because the cmssy catch-all serves /,
      # and React Router's routes.ts because cmssy init refuses to overwrite it.
      - name: Scaffold a fresh app with the framework's own CLI
        run: |
          case "${{ matrix.framework }}" in
            next)
              npx --yes create-next-app@latest /tmp/app --ts --app --no-eslint \
                --no-tailwind --no-src-dir --import-alias "@/*" \
                --skip-install --disable-git --yes
              rm /tmp/app/app/page.tsx
              ;;
            astro)
              npm create -y astro@latest /tmp/app -- --template minimal \
                --no-install --no-git --yes
              rm -f /tmp/app/src/pages/index.astro
              ;;
            remix)
              npx --yes create-react-router@latest /tmp/app --no-install \
                --no-git-init --yes
              rm /tmp/app/app/routes.ts
              rm -rf /tmp/app/app/routes/home.tsx /tmp/app/app/welcome
              ;;
          esac

      - name: Run the built cmssy init on it
        run: node packages/cli/dist/index.js init --dir /tmp/app

      # The generated block has to survive the framework's own build, not just
      # our unit tests - this is the same honesty rule as running init itself.
      - name: Run the built cmssy add block on it
        run: node packages/cli/dist/index.js add block smoke-card --dir /tmp/app

      # cmssy init pins the version it ships with, which is not on npm yet -
      # and asking npm for it would test the last release, not this diff. Pack
      # the packages and install the tarballs: that is the artifact users get,
      # not a symlink into a monorepo that resolves differently.
      - name: Pack this checkout
        run: |
          mkdir -p /tmp/pkgs
          for pkg in core react next astro remix eslint-plugin; do
            (cd "packages/$pkg" && pnpm pack --pack-destination /tmp/pkgs)
          done
          ls /tmp/pkgs

      - name: Install the app against those tarballs
        working-directory: /tmp/app
        run: |
          node -e '
            const fs = require("fs");
            const files = fs.readdirSync("/tmp/pkgs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const tarballFor = (name) => {
              const base = "cmssy-" + name.slice("@cmssy/".length) + "-";
              const file = files.find((f) => f.startsWith(base));
              if (!file) throw new Error("no tarball for " + name);
              return "file:/tmp/pkgs/" + file;
            };
            const linked = [];
            for (const field of ["dependencies", "devDependencies"]) {
              for (const name of Object.keys(pkg[field] ?? {})) {
                if (!name.startsWith("@cmssy/")) continue;
                pkg[field][name] = tarballFor(name);
                linked.push(name);
              }
            }
            // @cmssy/next depends on @cmssy/core at the version being released,
            // which is not on npm yet either - so redirect the transitive ones too.
            const overrides = {};
            for (const file of files) {
              const name = "@cmssy/" + file.replace(/^cmssy-/, "").replace(/-\d+\.\d+\.\d+.*$/, "");
              overrides[name] = "file:/tmp/pkgs/" + file;
            }
            pkg.pnpm = { ...pkg.pnpm, overrides };
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
            console.log("direct:", linked.join(", "));
            console.log("overrides:", Object.keys(overrides).join(", "));
          '
          pnpm install --no-frozen-lockfile

      # cmssy init tells the user to run this themselves - the CI does what the
      # user does. The React integration renders the blocks; the Node adapter
      # serves the on-demand cmssy routes.
      - name: Add the Astro integrations
        if: matrix.framework == 'astro'
        working-directory: /tmp/app
        run: npx astro add react node --yes

      # The Next build reads the workspace (sitemap, page data), so without the
      # secrets there is nothing honest to build against.
      - name: Build
        if: env.CMSSY_DRAFT_SECRET != ''
        working-directory: /tmp/app
        run: pnpm build

      # A build proves the app compiles. The editor is the path it cannot check,
      # and that needs a running server and a real workspace. Without the
      # secrets, say so - a green check that verifies nothing is worse than none.
      - name: Editor smoke test
        if: env.CMSSY_DRAFT_SECRET != ''
        working-directory: /tmp/app
        env:
          SMOKE_BASE_URL: http://localhost:${{ matrix.framework == 'astro' && '4321' || '3000' }}
        run: |
          cat > smoke-edit.mjs <<'EOF'
          import { checkCmssyEditMode } from "@cmssy/${{ matrix.framework }}/testing";

          const baseUrl = process.env.SMOKE_BASE_URL ?? "http://localhost:3000";
          const secret = process.env.CMSSY_DRAFT_SECRET;

          if (!secret) {
            console.error("CMSSY_DRAFT_SECRET is not set - the editor cannot be checked.");
            process.exit(1);
          }

          const result = await checkCmssyEditMode({ baseUrl, secret });

          if (!result.ok) {
            console.error("Editor smoke test FAILED:");
            for (const failure of result.failures) console.error(`  - ${failure}`);
            process.exit(1);
          }

          console.log("Editor smoke test passed.");
          EOF
          case "${{ matrix.framework }}" in
            astro) node ./dist/server/entry.mjs & ;;
            *) pnpm start & ;;
          esac
          npx --yes wait-on "$SMOKE_BASE_URL" --timeout 90000
          node smoke-edit.mjs

      # A green check that verifies nothing is worse than no check, so say it out
      # loud rather than let the job look like it proved something.
      - name: No workspace secrets - NOTHING was verified
        if: env.CMSSY_DRAFT_SECRET == ''
        run: |
          echo "::warning::CMSSY_ORG_SLUG / CMSSY_WORKSPACE_SLUG / CMSSY_DRAFT_SECRET" \
               "are not set on this repo, so the ${{ matrix.framework }} app was" \
               "scaffolded and wired but NEITHER built NOR checked. This job proved nothing."
